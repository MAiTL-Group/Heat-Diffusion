gpu_id: "1"

data:
    dataset: "fastMRIv2"
    image_size: 320
    channels: 2
    logit_transform: false
    uniform_dequantization: false
    gaussian_dequantization: false
    random_flip: true
    rescaled: false
    num_workers: 8
    # Edit the two paths below to point to your local data.
    # Training files are .mat with key "img"; sampling files are .mat with key "ksp".
    train_kspace_dir: "/path/to/your/training/data"
    sample_kspace_dir: "/path/to/your/test/data"

model:
    type: "simple"
    in_channels: 2
    out_ch: 2
    ch: 128
    ch_mult: [1, 1, 2, 2, 4, 4]
    num_res_blocks: 2
    attn_resolutions: [16, ]
    dropout: 0.0
    var_type: fixedsmall
    ema_rate: 0.999
    ema: True
    resamp_with_conv: True

diffusion:
    type: Heat
    beta_schedule: exp_log
    beta_start: 0.5
    beta_end: 24
    sigma_schedule: exp_log
    sigma_start: 0.01
    sigma_end: 1
    num_diffusion_timesteps: 1000
    Fourier: False
    is_weighted: False
    multi_channel: False

training:
    batch_size: 12
    n_epochs: 10000
    n_iters: 5000000
    snapshot_freq: 1000
    validation_freq: 2000

sampling:
    batch_size: 1
    last_only: True
    # Directory containing ckpt_<ckpt_id>.pth (or ckpt.pth)
    weight: "/path/to/your/pretrained/weights"
    ckpt_id: 671000
    mask_type: 'uniform1d'
    acc: '5'
    acs: "20"

optim:
    weight_decay: 0.000
    optimizer: "Adam"
    lr: 0.00002
    beta1: 0.9
    amsgrad: false
    eps: 0.00000001
